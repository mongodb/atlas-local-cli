name: Sign Windows Binary

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  sign-windows-binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse plan and set variables
        id: parse-plan
        env:
          PLAN: ${{ inputs.plan }}
        run: |
          TAG=$(echo "$PLAN" | jq -r '.announcement_tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          OWNER=$(echo "$PLAN" | jq -r '.releases[0].hosting.github.owner')
          REPO=$(echo "$PLAN" | jq -r '.releases[0].hosting.github.repo')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

          # Find the Windows executable-zip artifact
          WIN_ARCHIVE=$(echo "$PLAN" | jq -r '.artifacts | to_entries[] | select(.value.kind == "executable-zip") | select(.key | test("windows")) | .key')
          echo "Windows archive: $WIN_ARCHIVE"
          echo "win-archive=$WIN_ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        run: |
          mkdir -p work
          cd work
          gh release download "${{ steps.parse-plan.outputs.tag }}" \
            --repo "${{ steps.parse-plan.outputs.owner }}/${{ steps.parse-plan.outputs.repo }}" \
            --pattern "${{ steps.parse-plan.outputs.win-archive }}"
          echo "Downloaded:"
          ls -la

      - name: Extract zip
        run: |
          cd work
          mkdir -p extracted
          unzip "${{ steps.parse-plan.outputs.win-archive }}" -d extracted/
          echo "Extracted contents:"
          ls -la extracted/

      - name: Configure AWS credentials for ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::901841024863:role/ecr-role-gha-ro
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "901841024863"

      - name: Sign Windows binary with garasign-jsign
        run: |
          EXE_FILE=$(find work/extracted/ -name "*.exe" | head -1)
          echo "Signing: $EXE_FILE"

          # Write garasign credentials to a temp file outside the workspace
          printf 'GRS_CONFIG_USER1_USERNAME=%s\nGRS_CONFIG_USER1_PASSWORD=%s\n' \
            "${{ secrets.GRS_CONFIG_USER1_USERNAME }}" \
            "${{ secrets.GRS_CONFIG_USER1_PASSWORD }}" > "$RUNNER_TEMP/signing-envfile"

          # Ensure cleanup on exit
          trap 'rm -f "$RUNNER_TEMP/signing-envfile"' EXIT

          docker run \
            --env-file="$RUNNER_TEMP/signing-envfile" \
            --rm \
            -v "$(pwd)":"$(pwd)" \
            -w "$(pwd)" \
            ${{ vars.GRS_IMAGE }} \
            /bin/bash -c "jsign --tsaurl http://timestamp.digicert.com -a ${{ vars.AUTHENTICODE_KEY_NAME }} \"$EXE_FILE\""

          echo "Signed: $EXE_FILE"

      - name: Repack zip with signed binary
        run: |
          WIN_ARCHIVE="${{ steps.parse-plan.outputs.win-archive }}"
          rm "work/$WIN_ARCHIVE"
          cd work/extracted
          zip -j "../$WIN_ARCHIVE" ./*
          echo "Repacked:"
          ls -la "../$WIN_ARCHIVE"

      - name: Upload signed zip to release
        run: |
          WIN_ARCHIVE="${{ steps.parse-plan.outputs.win-archive }}"
          echo "Uploading signed $WIN_ARCHIVE to release..."
          gh release upload "${{ steps.parse-plan.outputs.tag }}" \
            --repo "${{ steps.parse-plan.outputs.owner }}/${{ steps.parse-plan.outputs.repo }}" \
            "work/$WIN_ARCHIVE" \
            --clobber
          echo "Upload complete"
